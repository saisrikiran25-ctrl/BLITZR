version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blitzr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blitzr_admin
      POSTGRES_PASSWORD: blitzr_dev_secret
      POSTGRES_DB: blitzr_prime
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../apps/backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U blitzr_admin -d blitzr_prime' ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blitzr-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
