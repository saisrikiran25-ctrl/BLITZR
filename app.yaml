name: blitzr-prime
region: blr
services:
  - name: blitzr-backend
    source_dir: /
    build_command: npm install --omit=dev
    run_command: npm start
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3001
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
      - key: JWT_SECRET
        scope: RUN_TIME
      - key: SARVAM_API_KEY
        scope: RUN_TIME
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
